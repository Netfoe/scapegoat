services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: scapegoat
      POSTGRES_PASSWORD: scapegoat_password
      POSTGRES_DB: scapegoat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scapegoat"]
      interval: 5s
      timeout: 5s
      retries: 5

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: 'start-from-init --masterkey "a-very-secret-masterkey-32-chars" --tlsMode disabled --steps /zitadel-setup.yaml'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./zitadel-setup.yaml:/zitadel-setup.yaml:ro
      - ./shared:/shared
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: scapegoat
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: scapegoat
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: scapegoat_password
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: scapegoat
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: scapegoat_password
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /shared/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "http://localhost:8080/ui/v2/login"
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "http://localhost:8080/ui/v2/login/login?authRequest="
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "http://localhost:8080/ui/v2/login/logout?post_logout_redirect="
      ZITADEL_DEFAULTINSTANCE_FEATURES_CONSOLEUSEV2USERAPI: "true"
      ZITADEL_V2_CONSOLE_ENABLED: "true"
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    depends_on:
      zitadel:
        condition: service_healthy
      zitadel-setup:
        condition: service_completed_successfully
    volumes:
      - ./shared:/zitadel/bootstrap:ro
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost:8080,X-Forwarded-Proto:http
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s

  zitadel-proxy:
    image: nginx:1.27-alpine
    depends_on:
      zitadel:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/zitadel.conf:/etc/nginx/conf.d/default.conf:ro

  zitadel-setup:
    image: postgres:alpine
    user: root
    command: >
      sh -c "apk add --no-cache curl jq && sh /scripts/setup-zitadel.sh"
    volumes:
      - ./scripts:/scripts:ro
      - ./shared:/shared
    depends_on:
      - zitadel
    environment:
      - ZITADEL_URL=http://zitadel:8080
      - PGPASSWORD=scapegoat_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://scapegoat:scapegoat_password@db:5432/scapegoat?sslmode=disable
      REDIS_URL: redis:6379
      PORT: 8081
      ZITADEL_DOMAIN: localhost:8080
      ZITADEL_INSECURE: "true"
    env_file:
      - ./shared/.env
    ports:
      - "8081:8081"
    volumes:
      - ./shared:/shared
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      zitadel-setup:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["./main", "--mode=worker"]
    environment:
      DATABASE_URL: postgres://scapegoat:scapegoat_password@db:5432/scapegoat?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8081
        - VITE_ZITADEL_AUTHORITY=http://localhost:8080
    env_file:
      - ./shared/.env
    ports:
      - "5173:5173"
    volumes:
      - ./shared:/shared
      - ./shared/env-config.js:/app/dist/env-config.js:ro
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully

volumes:
  postgres_data:
